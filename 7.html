<!DOCTYPE html>
<html>
<head>
<title>JavaScript Functions</title>
</head>
<body>
<h2>Functions Example</h2>
<p>Open Console to see output</p>
<script>
// Normal Function
function greet() {
   console.log("Hello from Normal Function");
}
greet();
// Anonymous Function
let msg = function() {
   console.log("Hello from Anonymous Function");
}
msg();
// Arrow Function
let add = (a, b) => {
   console.log("Sum =", a + b);
}
add(5, 3);
// Callback Function
function processUser(callback) {
   callback();
}
processUser(function() {
   console.log("Hello from Callback Function");
});
</script>
</body>
</html>
