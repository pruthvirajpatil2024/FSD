<!DOCTYPE html>
<html>
<head>
<title>Bootstrap Grid Example</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
<h2 class="text-center">Bootstrap Grid Layout</h2>
<div class="row">
<div class="col-sm-12 col-md-6 col-lg-4 bg-primary text-white p-3">
Column 1
</div>
<div class="col-sm-12 col-md-6 col-lg-4 bg-success text-white p-3">
Column 2
</div>
<div class="col-sm-12 col-md-12 col-lg-4 bg-warning p-3">
Column 3
</div>
<div class="col-sm-12 col-md-12 col-lg-4 bg-info p-3">
Column 4
</div>
<div class="col-sm-12 col-md-12 col-lg-4 bg-danger p-3">
Column 5
</div>
<div class="col-sm-12 col-md-12 col-lg-4 bg-secondary p-3">
Column 6
</div>
<div class="col-sm-12 col-md-12 col-lg-4 bg-light p-3">
Column 7
</div>
</div>
</div>
</body>
</html>
